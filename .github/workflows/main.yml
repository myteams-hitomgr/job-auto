name: Job Automation Run

on:
  # 手動で実行したい場合、または定期実行（必要に応じて設定してください）
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright Browsers
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      - name: Install 文字化け対策部品
        run: npm install iconv-lite

      - name: Run Automation Script
        env:
          HITOMGR_ID_M003: ${{ secrets.HITOMGR_ID_M003 }}
          HITOMGR_PASSWORD_PASSU003: ${{ secrets.HITOMGR_PASSWORD_PASSU003 }}
          HITOMGR_ID_U003: ${{ secrets.HITOMGR_ID_U003 }}
        run: node main.js
