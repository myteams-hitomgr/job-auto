name: job-auto

on:
  schedule:
    - cron: '0 */3 * * *' # 元の設定を維持（3時間おき）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npm install playwright

      - name: Install browsers
        run: npx playwright install chromium --with-deps

      - name: Run script
        env:
          # 💡 ここを追加することで、プログラムにIDとパスワードが正しく渡るようになります！
          HITOMGR_ID_M003: ${{ secrets.HITOMGR_ID_M003 }}
          HITOMGR_ID_U003: ${{ secrets.HITOMGR_ID_U003 }}
          HITOMGR_PASSWORD_PASSU003: ${{ secrets.HITOMGR_PASSWORD_PASSU003 }}
        run: node main.js

      - name: Upload screenshots
        if: always() # 途中でエラーが起きても必ずスクショを保存する設定
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
