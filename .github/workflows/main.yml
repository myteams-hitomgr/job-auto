name: Job Automation Run

permissions:
  contents: write

on:
  workflow_dispatch:

  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright Browsers
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium

      - name: Install 文字化け対策部品
        run: npm install iconv-lite

      - name: Run Automation Script
        env:
          HITOMGR_ID_M003: ${{ secrets.HITOMGR_ID_M003 }}
          HITOMGR_PASSWORD_PASSU003: ${{ secrets.HITOMGR_PASSWORD_PASSU003 }}
          HITOMGR_ID_U003: ${{ secrets.HITOMGR_ID_U003 }}
              - name: Save counter
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add counter.json
          git commit -m "update counter" || exit 0
          git push
